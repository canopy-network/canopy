syntax = "proto3";
package types;
option go_package = "github.com/canopy-network/go-plugin/contract";

import "google/protobuf/any.proto";

// Transaction represents a request or action submitted to the network
// THIS MUST MATCH lib.Transaction EXACTLY for signing
message Transaction {
  string message_type = 1; // @gotags: json:"messageType"
  google.protobuf.Any msg = 2;
  Signature signature = 3;
  uint64 created_height = 4; // @gotags: json:"createdHeight"
  uint64 time = 5;
  uint64 fee = 6;
  string memo = 7;
  uint64 network_id = 8; // @gotags: json:"networkID"
  uint64 chain_id = 9;   // @gotags: json:"chainID"
  // NO CONFLICT STARTING AT FIELD = 10
}

// ── Built-in: Standard token transfer ───────────────────────────
message MessageSend {
  bytes from_address = 1; // @gotags: json:"fromAddress"
  bytes to_address = 2;   // @gotags: json:"toAddress"
  uint64 amount = 3;
}

// ── Praxis: Create a new prediction market ───────────────────────
message MessageCreateMarket {
  bytes  creator_address    = 1; // @gotags: json:"creatorAddress"
  string question           = 2; // e.g. "Will BTC hit $100k by EOY?"
  string description        = 3; // optional longer description
  bytes  resolver_address   = 4; // @gotags: json:"resolverAddress"
  uint64 resolution_height  = 5; // @gotags: json:"resolutionHeight"
  uint64 stake_amount       = 6; // @gotags: json:"stakeAmount"
}

// ── Praxis: Submit a prediction (bet YES=1 or NO=0) ─────────────
message MessageSubmitPrediction {
  bytes  forecaster_address = 1; // @gotags: json:"forecasterAddress"
  uint64 market_id          = 2; // @gotags: json:"marketId"
  uint32 outcome            = 3; // 1 = YES, 0 = NO
  uint64 amount             = 4;
}

// ── Praxis: Resolver declares winning outcome ────────────────────
message MessageResolveMarket {
  bytes  resolver_address = 1; // @gotags: json:"resolverAddress"
  uint64 market_id        = 2; // @gotags: json:"marketId"
  uint32 winning_outcome  = 3; // @gotags: json:"winningOutcome"
}

// ── Praxis: Forecaster claims winnings ───────────────────────────
message MessageClaimWinnings {
  bytes  claimer_address = 1; // @gotags: json:"claimerAddress"
  uint64 market_id       = 2; // @gotags: json:"marketId"
}

// ── State objects ─────────────────────────────────────────────────

// Market holds all data for a prediction market
message Market {
  uint64   id                = 1;
  bytes    creator_address   = 2;  // @gotags: json:"creatorAddress"
  string   question          = 3;
  string   description       = 4;
  bytes    resolver_address  = 5;  // @gotags: json:"resolverAddress"
  uint64   resolution_height = 6;  // @gotags: json:"resolutionHeight"
  uint32   status            = 7;  // 0=open, 1=resolving, 2=resolved
  uint32   winning_outcome   = 8;  // @gotags: json:"winningOutcome"
  uint64   total_yes_pool    = 9;  // @gotags: json:"totalYesPool"
  uint64   total_no_pool     = 10; // @gotags: json:"totalNoPool"
  uint64   created_height    = 11; // @gotags: json:"createdHeight"
}

// Prediction holds a single forecaster's bet on a market
message Prediction {
  bytes  forecaster_address = 1;  // @gotags: json:"forecasterAddress"
  uint64 market_id          = 2;  // @gotags: json:"marketId"
  uint32 outcome            = 3;
  uint64 amount             = 4;
  bool   claimed            = 5;
}

// MarketCounter tracks the next market ID (auto-increment)
message MarketCounter {
  uint64 count = 1;
}

// ForecasterRecord tracks a forecaster's overall stats for the leaderboard
message ForecasterRecord {
  bytes  address        = 1;
  uint64 total_bets     = 2; // @gotags: json:"totalBets"
  uint64 correct_bets   = 3; // @gotags: json:"correctBets"
  uint64 total_staked   = 4; // @gotags: json:"totalStaked"
  uint64 total_earned   = 5; // @gotags: json:"totalEarned"
}

// ── Governance parameters ──────────────────────────────────────────
message FeeParams {
  uint64 send_fee         = 1;  // @gotags: json:"sendFee"
  uint64 create_market_fee = 14; // @gotags: json:"createMarketFee"
  // NO CONFLICT STARTING AT FIELD = 15
}

// Signature holds the BLS12-381 signature
message Signature {
  bytes public_key = 1; // @gotags: json:"publicKey"
  bytes signature  = 2;
}
