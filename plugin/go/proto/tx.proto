syntax = "proto3";

package types;

option go_package = "github.com/canopy-network/canopy/plugin/go/contract";

import "google/protobuf/any.proto";

// Required by plugin.proto
message Signature {
  bytes public_key = 1;
  bytes signature  = 2;
}

message Transaction {
  string              message_type   = 1;
  google.protobuf.Any msg            = 2;
  Signature           signature      = 3;
  uint64              created_height = 4;
  uint64              time           = 5;
  uint64              fee            = 6;
  string              memo           = 7;
  uint64              network_id     = 8;
  uint64              chain_id       = 9;
}

message FeeParams {
  uint64 send_fee              = 1;
  uint64 create_market_fee     = 2;
  uint64 submit_prediction_fee = 3;
  uint64 resolve_market_fee    = 4;
  uint64 claim_winnings_fee    = 5;
}

// ADLMSR state objects (0x10-0x14)
message MarketState {
  uint32 status          = 1;
  uint64 expiry_time     = 2;
  uint64 q_yes           = 3;
  uint64 q_no            = 4;
  uint64 b_eff           = 5;
  bytes  creator         = 6;
  uint64 claimed_count   = 7;
  uint64 total_positions = 8;
  uint64 open_time       = 9;
  bool   elevated_risk        = 10;
  uint64 finalized_pool_amount = 11;
}

message PositionState {
  uint64 shares_yes = 1;
  uint64 shares_no  = 2;
  uint64 cost_paid  = 3;
  bool   claimed    = 4;
}

message OutcomeState {
  bool   winning_outcome = 1;
  uint64 resolved_at     = 2;
}

message TreasuryReserve {
  uint64 locked_reserve = 1;
}

// PORS state objects (0x13, 0x16-0x1C)
message ResolverState {
  bytes resolver_address = 1;
}

message ResolverRecord {
  bytes  resolver_address = 1;
  uint64 stake_amount     = 2;
  uint64 rrs_score        = 3;
  uint64 registered_at    = 4;
}

message ProposalRecord {
  bytes  resolver_addr    = 1;
  bool   proposed_outcome = 2;
  uint64 proposal_bond    = 3;
  uint64 proposal_block   = 4;
  uint32 status           = 5;
}

message DisputeRecord {
  bytes          disputer_address = 1;
  uint64         dispute_bond     = 2;
  uint64         dispute_block    = 3;
  uint32         vote_status      = 4;
  uint32         panel_size       = 5;
  repeated bytes panel_members    = 6;
}

message VoteCommit {
  bytes  voter_addr   = 1;
  bytes  commit_hash  = 2;
  uint64 committed_at = 3;
}

message VoteReveal {
  bytes  voter_addr  = 1;
  bool   vote        = 2;
  uint64 revealed_at = 3;
}

message SlashRecord {
  bytes  slashed_address = 1;
  uint64 slash_amount    = 2;
  uint64 slashed_at      = 3;
}

message PanelEntropyAccum {
  uint64 accumulator = 1;
}

// Transaction messages (12 types)
message MessageSend {
  bytes  from_address = 1;
  bytes  to_address   = 2;
  uint64 amount       = 3;
}

message MessageCreateMarket {
  bytes  creator_address = 1;
  uint64 b0              = 2;
  uint64 expiry_time     = 3;
  uint64 nonce           = 4;
  string question        = 5;
}

message MessageSubmitPrediction {
  bytes  market_id = 1;
  bytes  bettor_address = 2;
  bool   outcome   = 3;
  uint64 shares    = 4;
  uint64 max_cost  = 5;
}

message MessageClaimWinnings {
  bytes market_id        = 1;
  bytes claimant_address = 2;
}

message MessageResolveMarket {
  bytes market_id        = 1;
  bytes resolver_address = 2;
  bool  winning_outcome  = 3;
}

message MessageRegisterResolver {
  bytes  resolver_address = 1;
  uint64 stake_amount     = 2;
}

message MessageProposeOutcome {
  bytes  market_id        = 1;
  bytes  resolver_address = 2;
  bool   proposed_outcome = 3;
  uint64 proposal_bond    = 4;
}

message MessageFileDispute {
  bytes  market_id        = 1;
  bytes  disputer_address = 2;
  uint64 dispute_bond     = 3;
}

message MessageCommitVote {
  bytes market_id   = 1;
  bytes voter_addr  = 2;
  bytes commit_hash = 3;
}

message MessageRevealVote {
  bytes  market_id  = 1;
  bytes  voter_addr = 2;
  bool   vote       = 3;
  bytes  nonce      = 4;
}

message MessageTallyVotes {
  bytes market_id   = 1;
  bytes caller_addr = 2;
}

message MessageFinalizeMarket {
  bytes market_id   = 1;
  bytes caller_addr = 2;
}

message MessageClaimSlash {
  bytes market_id        = 1;
  bytes claimant_address = 2;
}

message MessageReclaimStake {
  bytes market_id        = 1;
  bytes claimant_address = 2;
}

// MessageForfeitPosition allows a resolver to voluntarily exit a position
// in a market they intend to resolve — satisfying the COI-1 requirement.
// Issue-2: without this tx type, a resolver with even 1 share is permanently
// disqualified from resolving, with no protocol-level escape hatch.
// The full CostPaid is refunded; shares are zeroed atomically.
message MessageForfeitPosition {
  bytes market_id        = 1;
  bytes resolver_address = 2;
}
